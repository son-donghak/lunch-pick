<style>
  :root {
    --bg: #fff7f0; --card: #ffffff; --ink: #2b2622; --muted: #8a807a; --line: #f0e6dc;
    --brand: #ff6b35; --brand-dark: #e85220; --brand-soft: #fff0e8; --ok: #2f9e57;
    --shadow: 0 10px 30px rgba(255, 107, 53, 0.12); --radius: 18px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  [hidden] { display: none !important; }   /* class의 display 설정에 hidden이 묻히지 않도록 */
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",
      "Malgun Gothic", "Noto Sans KR", sans-serif;
    background: var(--bg); color: var(--ink); line-height: 1.6;
    -webkit-font-smoothing: antialiased; padding: 16px; display: flex; justify-content: center;
  }
  .wrap { width: 100%; max-width: 460px; }

  .lang-bar { display: flex; justify-content: flex-end; }
  .lang-btn {
    background: #fff; border: 1px solid var(--line); border-radius: 999px;
    padding: 6px 14px; font-family: inherit; font-size: 13px; font-weight: 700;
    color: var(--brand-dark); cursor: pointer; transition: background .15s;
  }
  .lang-btn:hover { background: var(--brand-soft); }

  header { text-align: center; padding: 8px 0 6px; }
  header h1 { font-size: 22px; letter-spacing: -0.5px; }
  header p { color: var(--muted); font-size: 13px; margin-top: 4px; }
  .today { font-size: 12px; color: var(--brand-dark); font-weight: 600; margin-top: 6px; }

  .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 22px; margin-top: 16px; }

  /* 모드 탭 */
  .modes { display: flex; gap: 6px; background: var(--bg); padding: 4px; border-radius: 12px; margin-bottom: 16px; }
  .mode-tab {
    flex: 1; border: none; background: transparent; padding: 9px; border-radius: 9px;
    font-family: inherit; font-weight: 700; font-size: 14px; color: var(--muted); cursor: pointer; transition: all .15s;
  }
  .mode-tab.active { background: #fff; color: var(--brand-dark); box-shadow: 0 2px 6px rgba(0,0,0,.07); }

  /* 거리 슬라이더 */
  .radius { margin-bottom: 16px; }
  .radius .rl { display: block; font-size: 13px; color: var(--muted); margin-bottom: 8px; text-align: center; font-weight: 700; }
  .radius .rl b { color: var(--brand-dark); }
  .radius input[type=range] { width: 100%; accent-color: var(--brand); height: 22px; }

  /* 예산 */
  .budget { display: flex; align-items: center; justify-content: space-between; gap: 10px; margin-bottom: 16px; font-size: 14px; font-weight: 700; color: var(--muted); }
  .budget select { font-family: inherit; font-size: 14px; font-weight: 700; padding: 7px 10px; border: 1px solid var(--line); border-radius: 10px; background: #fff; color: var(--ink); }

  .pick .price { color: var(--brand-dark); font-size: 13px; font-weight: 700; margin-top: 4px; }

  /* 추천 카드 */
  .pick { text-align: center; padding: 30px 22px; }
  .pick .emoji { font-size: 76px; line-height: 1; display: block; margin-bottom: 10px; animation: pop .35s cubic-bezier(.2,1.3,.5,1); }
  @keyframes pop { from { transform: scale(.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .pick .name { font-size: 30px; font-weight: 800; letter-spacing: -0.8px; }
  .pick .cat { color: var(--muted); font-size: 13px; margin-top: 4px; }
  .pick .placeholder { color: var(--muted); font-size: 16px; padding: 20px 0; }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    border: none; border-radius: 12px; cursor: pointer; font-family: inherit; font-weight: 700;
    font-size: 16px; padding: 14px 18px; width: 100%; transition: transform .08s, background .15s, box-shadow .15s;
  }
  .btn:active { transform: scale(.98); }
  .btn:disabled { opacity: .6; cursor: default; }
  .btn-primary { background: var(--brand); color: #fff; box-shadow: 0 6px 16px rgba(255,107,53,.35); }
  .btn-primary:hover { background: var(--brand-dark); }
  .btn-ghost { background: var(--brand-soft); color: var(--brand-dark); }
  .btn-ghost:hover { background: #ffe3d4; }
  .btn-ok { background: var(--ok); color: #fff; }
  .btn-row { display: flex; gap: 10px; margin-top: 12px; }
  .btn-row .btn { font-size: 15px; padding: 13px 10px; }

  /* 지도앱 폴백 */
  .maps { margin-top: 14px; }
  .maps .label { font-size: 13px; color: var(--muted); margin-bottom: 8px; text-align: center; }
  .map-row { display: flex; gap: 8px; }
  .map-btn {
    flex: 1; text-align: center; text-decoration: none; border: 1px solid var(--line);
    border-radius: 11px; padding: 11px 6px; font-size: 13px; font-weight: 700; color: var(--ink); background: #fff;
  }
  .map-btn:hover { background: var(--bg); }
  .map-btn span { display: block; font-size: 20px; margin-bottom: 2px; }

  /* 식당 검색 상태/결과 */
  .place-status { text-align: center; color: var(--muted); font-size: 13.5px; padding: 16px 4px; }
  .place-status a { color: var(--brand-dark); font-weight: 700; }
  .reco { border: 2px solid var(--brand); background: var(--brand-soft); border-radius: 14px; padding: 14px; margin-top: 16px; }
  .reco .rtag { font-size: 12px; color: var(--brand-dark); font-weight: 800; }
  .reco .rname { font-size: 20px; font-weight: 800; margin-top: 3px; letter-spacing: -0.4px; }
  .reco .rmeta { font-size: 13px; color: var(--muted); margin-top: 3px; }
  .reco .rbtns { display: flex; gap: 8px; margin-top: 12px; }
  .reco .rbtns .btn { font-size: 14px; padding: 11px 8px; }
  .reco .rlink { display: inline-block; margin-top: 10px; font-size: 13px; color: var(--brand-dark); font-weight: 700; text-decoration: none; }
  .list-title { font-size: 13px; color: var(--muted); margin-top: 16px; font-weight: 700; }
  .place-list { list-style: none; margin-top: 6px; }
  .place-list li { border-bottom: 1px solid var(--line); }
  .place-list li:last-child { border-bottom: none; }
  .place-list a { text-decoration: none; color: var(--ink); display: flex; align-items: baseline; gap: 8px; padding: 11px 0; }
  .place-list .pn { font-weight: 700; font-size: 15px; }
  .place-list .pc { font-size: 12px; color: var(--muted); }
  .place-list .pd { font-size: 12px; color: var(--brand-dark); margin-left: auto; font-weight: 700; white-space: nowrap; }

  .settings { display: flex; align-items: center; justify-content: space-between; font-size: 14px; gap: 10px; }
  .settings select { font-family: inherit; font-size: 14px; padding: 7px 10px; border: 1px solid var(--line); border-radius: 10px; background: #fff; color: var(--ink); }

  .sec-title { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .sec-title h2 { font-size: 15px; }
  .sec-title button { background: none; border: none; color: var(--muted); font-size: 12px; cursor: pointer; font-family: inherit; }
  .sec-title button:hover { color: var(--brand-dark); }
  .hist-list { list-style: none; }
  .hist-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--line); font-size: 15px; }
  .hist-item:last-child { border-bottom: none; }
  .hist-item .he { font-size: 22px; }
  .hist-item .hd { color: var(--muted); font-size: 12px; margin-left: auto; }
  .empty { color: var(--muted); font-size: 14px; text-align: center; padding: 16px 0; }

  .ad-slot {
    margin-top: 16px; min-height: 100px; display: flex; align-items: center; justify-content: center;
    background: #fff; border: 1px dashed var(--line); border-radius: 14px; color: var(--muted); font-size: 12px; text-align: center; padding: 12px;
  }
  footer { text-align: center; color: var(--muted); font-size: 11px; padding: 22px 0 8px; }
</style>
</head>

<div class="wrap">
  <div class="lang-bar"><button class="lang-btn" id="langBtn">EN</button></div>

  <header>
    <h1 id="title"></h1>

  <!-- 메뉴 추천 카드 (메뉴 모드에서만 표시) -->
  <div class="card pick" id="pickCard">

    <div id="pickResult" hidden>
      <span class="emoji" id="pickEmoji">🍚</span>
      <div class="name" id="pickName">메뉴</div>
      <div class="cat" id="pickCat"></div>
      <div class="price" id="pickPrice"></div>
    </div>
  </div>

  <!-- 컨트롤 카드 -->
  <div class="card">
    <div class="modes">
      <button class="mode-tab active" id="tabMenu"></button>
      <button class="mode-tab" id="tabNearby"></button>
    </div>

    <div class="radius">
      <span class="rl" id="radiusLabel"></span>
      <input type="range" id="radius" min="100" max="2000" step="100" value="500" />
    </div>

    <div class="budget">
      <label for="budget" id="budgetLabel"></label>
      <select id="budget">
        <option value="10000"></option>
        <option value="15000" selected></option>
        <option value="20000"></option>
        <option value="0"></option>
      </select>
    </div>

    <!-- 메뉴 모드 -->
    <div id="menuPanel">
      <button class="btn btn-primary" id="recommendBtn"></button>
      <div class="btn-row" id="actionRow" hidden>
        <button class="btn btn-ghost" id="rerollBtn"></button>
        <button class="btn btn-ok" id="eatBtn"></button>
      </div>
      <button class="btn btn-ghost" id="findMenuBtn" hidden style="margin-top:10px"></button>
    </div>

    <!-- 주변 식당 모드 -->
    <div id="nearbyPanel" hidden>
      <button class="btn btn-primary" id="findNearbyBtn"></button>
    </div>

    <!-- 지도앱 폴백 (카카오 키 없을 때, 메뉴 모드) -->
    <div class="maps" id="mapsBox" hidden>
      <div class="label" id="mapsLabel"></div>
      <div class="map-row">
        <a class="map-btn" id="mapKakao" target="_blank" rel="noopener"><span>🟡</span><span id="lblKakao"></span></a>
        <a class="map-btn" id="mapNaver" target="_blank" rel="noopener"><span>🟢</span><span id="lblNaver"></span></a>
        <a class="map-btn" id="mapGoogle" target="_blank" rel="noopener"><span>🔵</span><span id="lblGoogle"></span></a>
      </div>
    </div>

    <!-- 검색 상태/결과 -->
    <div class="place-status" id="placeStatus" hidden></div>
    <div id="placeResults" hidden>
      <div class="reco" id="placeReco"></div>
      <div class="list-title" id="listTitle"></div>
      <ul class="place-list" id="placeList"></ul>
    </div>
  </div>

  <!-- 설정 -->
  <div class="card settings">
    <label for="cooldown" id="settingsLabel"></label>
    <select id="cooldown">
      <option value="3"></option>
      <option value="5" selected></option>
      <option value="7"></option>
      <option value="14"></option>
    </select>
  </div>

  <!-- 광고 -->
  <div class="ad-slot" id="adSlot"><span id="adLabel"></span></div>

  <!-- 기록 -->
  <div class="card">
    <div class="sec-title">
      <h2 id="histTitle"></h2>
      <button id="clearBtn"></button>
    </div>
    <ul class="hist-list" id="histList"></ul>
  </div>

  <footer id="footer"></footer>
</div>

  // ====== 메뉴 추천 ======
  function recentMenuIds() {
    var days = parseInt($("cooldown").value, 10) || 5, cutoff = daysAgoStr(days - 1), ids = {};

    return ids;
  }
  function pickMenu() {
    var recent = recentMenuIds(), budget = curBudget();
    var inBudget = function (m) { return !budget || m.price <= budget; };
    var pool = MENUS.filter(function (m) { return inBudget(m) && !recent[m.id] && sessionShown.indexOf(m.id) === -1; });
    if (!pool.length) pool = MENUS.filter(function (m) { return inBudget(m) && !recent[m.id]; });
    if (!pool.length) pool = MENUS.filter(inBudget);
    if (!pool.length) pool = MENUS.slice();
    return pool[Math.floor(Math.random() * pool.length)];
  }

  // ====== 식당 검색 ======
  function clearPlaces() {
    lastPlaces = []; recoPlace = null; lastKeyword = null;

  }
  function showStatus(html) { $("placeStatus").innerHTML = html; $("placeStatus").hidden = false; $("placeResults").hidden = true; }

  function runSearch(menuObj) {
    var keyword = menuObj ? menuObj.ko : null;
    var displayName = menuObj ? menuName(menuObj) : null;
    lastKeyword = keyword;
    if (!kakaoEnabled()) {
      if (menuObj) { renderMapsFallback(); }
      else { showStatus(t().kakaoNote + '<br><a href="https://map.kakao.com/?q=' + encodeURIComponent("음식점") + '" target="_blank" rel="noopener">' + t().kakaoMapLink + "</a>"); }
      return;
    }
    showStatus(t().locating);
    loadKakao(function (ok) {
      if (!ok) { showStatus(t().searchErr); return; }
      ensureLocation(function (err, pos) {
        if (err) { showStatus(t().locErr); return; }
        showStatus(t().searching);
        var ps = new window.kakao.maps.services.Places();
        var radius = curRadius();
        // var opts = { x: String(pos.lng), y: String(pos.lat), radius: radius, sort: window.kakao.maps.services.SortBy.DISTANCE, size: 15 };
        // gssg - 거리 제한 오작동 문제 수정 start - [
        var loc = new window.kakao.maps.LatLng(pos.lat, pos.lng);
        var opts = { location: loc, x: String(pos.lng), y: String(pos.lat), radius: radius, sort: window.kakao.maps.services.SortBy.DISTANCE, size: 15 };
        // ] - end
        var budget = curBudget();
        var done = function (data, status) {
          // console.log("kakao status:", status, data); // gssg - 디버그용, 확인 후 제거
          var S = window.kakao.maps.services.Status;
          if (status === S.OK && data && data.length) {
            // 주변(카테고리) 검색에서만 비싼 업종을 예산으로 거름
            if (!keyword && budget) data = data.filter(function (p) { return withinBudget(p, budget); });
            if (!data.length) { showStatus(t().noResultsBudget); return; }
            lastPlaces = data;
            recoPlace = data[Math.floor(Math.random() * data.length)];
            renderPlaces();
            track("find_restaurants", { mode: mode, radius: radius, budget: budget, keyword: keyword || "category", count: data.length });
          } else if (status === S.ZERO_RESULT) {
            showStatus(t().noResults(displayName));
          } else {
            showStatus(t().searchErr);
          }
        };
        if (keyword) ps.keywordSearch(keyword, done, opts);
        else ps.categorySearch("FD6", done, opts);
      });
    });
  }

  $("recommendBtn").addEventListener("click", function () { showPick(pickMenu()); });
  $("rerollBtn").addEventListener("click", function () { showPick(pickMenu()); });
  $("eatBtn").addEventListener("click", eatCurrent);
  $("findMenuBtn").addEventListener("click", function () { if (current) runSearch(current); });
  $("findNearbyBtn").addEventListener("click", function () { runSearch(null); });
  $("tabMenu").addEventListener("click", function () { switchMode("menu"); });
  $("tabNearby").addEventListener("click", function () { switchMode("nearby"); });
  $("radius").addEventListener("input", function () { $("radiusLabel").innerHTML = t().radius(curRadius()); });
  $("clearBtn").addEventListener("click", function () { if (confirm(t().confirmClear)) { saveHistory([]); renderHistory(); } });
  $("cooldown").addEventListener("change", function () {
    var s = loadSettings(); s.cooldown = $("cooldown").value; saveSettings(s); sessionShown = [];
    $("settingsLabel").innerHTML = t().settings(t().cooldownOpt($("cooldown").value));
  });
  $("budget").addEventListener("change", function () {
    var s = loadSettings(); s.budget = $("budget").value; saveSettings(s); sessionShown = [];
  });
  $("langBtn").addEventListener("click", function () { setLang(lang === "ko" ? "en" : "ko"); });

  // ====== 초기화 ======
  function init() {
    loadGA();
    var s = loadSettings();
    if (s.cooldown) $("cooldown").value = s.cooldown;
    if (s.radius) $("radius").value = s.radius;
    if (s.budget != null) $("budget").value = s.budget;
    if (s.lang === "ko" || s.lang === "en") lang = s.lang;
    else lang = (navigator.language || "ko").toLowerCase().indexOf("ko") === 0 ? "ko" : "en";
    applyLang();
    switchMode(s.mode === "nearby" ? "nearby" : "menu");
  }
  // radius 저장
  document.getElementById("radius").addEventListener("change", function () {
    var s = loadSettings(); s.radius = this.value; saveSettings(s);
  });
  init();
})();
</script>
</body>
</html>

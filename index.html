<style>
  :root {
    --bg: #fff7f0;
    --card: #ffffff;
    --ink: #2b2622;
    --muted: #8a807a;
    --line: #f0e6dc;
    --brand: #ff6b35;
    --brand-dark: #e85220;
    --brand-soft: #fff0e8;
    --ok: #2f9e57;
    --shadow: 0 10px 30px rgba(255, 107, 53, 0.12);
    --radius: 18px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",
      "Malgun Gothic", "Noto Sans KR", sans-serif;
    background: var(--bg);
    color: var(--ink);
    line-height: 1.6;
    -webkit-font-smoothing: antialiased;
    padding: 16px;
    display: flex;
    justify-content: center;
  }
  .wrap { width: 100%; max-width: 460px; }

  /* 언어 토글 */
  .lang-bar { display: flex; justify-content: flex-end; }
  .lang-btn {
    background: #fff; border: 1px solid var(--line); border-radius: 999px;
    padding: 6px 14px; font-family: inherit; font-size: 13px; font-weight: 700;
    color: var(--brand-dark); cursor: pointer; transition: background .15s;
  }
  .lang-btn:hover { background: var(--brand-soft); }

  header { text-align: center; padding: 8px 0 6px; }
  header h1 { font-size: 22px; letter-spacing: -0.5px; }
  header p { color: var(--muted); font-size: 13px; margin-top: 4px; }
  .today { font-size: 12px; color: var(--brand-dark); font-weight: 600; margin-top: 6px; }

  .card {
    background: var(--card);
    border-radius: var(--radius);
    box-shadow: var(--shadow);
    padding: 22px;
    margin-top: 16px;
  }

  /* 추천 카드 */
  .pick { text-align: center; padding: 30px 22px; }
  .pick .emoji {
    font-size: 76px;
    line-height: 1;
    display: block;
    margin-bottom: 10px;
    animation: pop 0.35s cubic-bezier(.2,1.3,.5,1);
  }
  @keyframes pop { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }
  .pick .name { font-size: 30px; font-weight: 800; letter-spacing: -0.8px; }
  .pick .cat { color: var(--muted); font-size: 13px; margin-top: 4px; }
  .pick .placeholder { color: var(--muted); font-size: 16px; padding: 20px 0; }

  /* 버튼 */
  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    border: none; border-radius: 12px; cursor: pointer;
    font-family: inherit; font-weight: 700; font-size: 16px;
    padding: 14px 18px; width: 100%;
    transition: transform .08s ease, background .15s ease, box-shadow .15s ease;
  }
  .btn:active { transform: scale(0.98); }
  .btn-primary { background: var(--brand); color: #fff; box-shadow: 0 6px 16px rgba(255,107,53,.35); }
  .btn-primary:hover { background: var(--brand-dark); }
  .btn-ghost { background: var(--brand-soft); color: var(--brand-dark); }
  .btn-ghost:hover { background: #ffe3d4; }
  .btn-ok { background: var(--ok); color: #fff; }
  .btn-row { display: flex; gap: 10px; margin-top: 12px; }
  .btn-row .btn { font-size: 15px; padding: 13px 10px; }

  /* 지도 검색 */
  .maps { margin-top: 16px; }
  .maps .label { font-size: 13px; color: var(--muted); margin-bottom: 8px; text-align: center; }
  .map-row { display: flex; gap: 8px; }
  .map-btn {
    flex: 1; text-align: center; text-decoration: none;
    border: 1px solid var(--line); border-radius: 11px;
    padding: 11px 6px; font-size: 13px; font-weight: 700; color: var(--ink);
    background: #fff; transition: background .15s;
  }
  .map-btn:hover { background: var(--bg); }
  .map-btn span { display: block; font-size: 20px; margin-bottom: 2px; }

  /* 설정 */
  .settings { display: flex; align-items: center; justify-content: space-between; font-size: 14px; gap: 10px; }
  .settings select {
    font-family: inherit; font-size: 14px; padding: 7px 10px;
    border: 1px solid var(--line); border-radius: 10px; background: #fff; color: var(--ink);
  }

  /* 기록 */
  .sec-title { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .sec-title h2 { font-size: 15px; }
  .sec-title button { background: none; border: none; color: var(--muted); font-size: 12px; cursor: pointer; font-family: inherit; }
  .sec-title button:hover { color: var(--brand-dark); }
  .hist-list { list-style: none; }
  .hist-item {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 0; border-bottom: 1px solid var(--line); font-size: 15px;
  }
  .hist-item:last-child { border-bottom: none; }
  .hist-item .he { font-size: 22px; }
  .hist-item .hd { color: var(--muted); font-size: 12px; margin-left: auto; }
  .empty { color: var(--muted); font-size: 14px; text-align: center; padding: 16px 0; }

  /* 광고 슬롯 */
  .ad-slot {
    margin-top: 16px; min-height: 100px;
    display: flex; align-items: center; justify-content: center;
    background: #fff; border: 1px dashed var(--line); border-radius: 14px;
    color: var(--muted); font-size: 12px; text-align: center; padding: 12px;
  }

  footer { text-align: center; color: var(--muted); font-size: 11px; padding: 22px 0 8px; }

<div class="wrap">

  </header>

    <div id="pickResult" hidden>
      <span class="emoji" id="pickEmoji">🍚</span>
      <div class="name" id="pickName">메뉴</div>
      <div class="cat" id="pickCat"></div>
    </div>
  </div>

  <!-- 액션 -->
  <div class="card">
    <button class="btn btn-primary" id="recommendBtn"></button>
    <div class="btn-row" id="actionRow" hidden>
      <button class="btn btn-ghost" id="rerollBtn"></button>
      <button class="btn btn-ok" id="eatBtn"></button>
    </div>

    <!-- 주변 음식점 찾기 -->
    <div class="maps" id="mapsBox" hidden>
      <div class="label" id="mapsLabel"></div>
      <div class="map-row">
        <a class="map-btn" id="mapKakao" target="_blank" rel="noopener"><span>🟡</span><span id="lblKakao"></span></a>
        <a class="map-btn" id="mapNaver" target="_blank" rel="noopener"><span>🟢</span><span id="lblNaver"></span></a>
        <a class="map-btn" id="mapGoogle" target="_blank" rel="noopener"><span>🔵</span><span id="lblGoogle"></span></a>
      </div>
    </div>
  </div>

  <!-- 설정 -->
  <div class="card settings">
    <label for="cooldown" id="settingsLabel"></label>
    <select id="cooldown">
      <option value="3"></option>
      <option value="5" selected></option>
      <option value="7"></option>
      <option value="14"></option>
    </select>
  </div>

  <!-- 광고 슬롯 (AdSense) -->
  <div class="ad-slot" id="adSlot">
    <span id="adLabel"></span>
    <!-- 승인 후 위 주석 처리된 <script> 를 활성화하고, 아래를 사용하세요:
    <ins class="adsbygoogle"

         data-ad-client="ca-pub-0000000000000000"
         data-ad-slot="0000000000"
         data-ad-format="auto"
         data-full-width-responsive="true"></ins>
    <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
    -->
  </div>

  <!-- 기록 -->
  <div class="card">
    <div class="sec-title">
      <h2 id="histTitle"></h2>
      <button id="clearBtn"></button>
    </div>
    <ul class="hist-list" id="histList"></ul>
  </div>

  <footer id="footer"></footer>
</div>

  // ---- 날짜 ----
  function dstr(d) {
    return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0");
  }
  function todayStr() { return dstr(new Date()); }
  function daysAgoStr(n) { var d = new Date(); d.setDate(d.getDate() - n); return dstr(d); }
  function prettyDate(s) {
    if (s === todayStr()) return t().today;
    if (s === daysAgoStr(1)) return t().yesterday;
    var p = s.split("-");
    var d = new Date(+p[0], +p[1] - 1, +p[2]);
    return d.toLocaleDateString(t().locale, { month: "short", day: "numeric", weekday: "short" });
  }

  // ---- 최근 먹은 메뉴(쿨다운) ----
  function recentMenuIds() {
    var days = parseInt($("cooldown").value, 10) || 5;
    var cutoff = daysAgoStr(days - 1);
    var ids = {};
    loadHistory().forEach(function (item) { if (item.date >= cutoff && item.id) ids[item.id] = true; });
    return ids;
  }

  // ---- 추천 ----
  function pickMenu() {
    var recent = recentMenuIds();
    var pool = MENUS.filter(function (m) { return !recent[m.id] && sessionShown.indexOf(m.id) === -1; });
    if (pool.length === 0) pool = MENUS.filter(function (m) { return !recent[m.id]; });
    if (pool.length === 0) pool = MENUS.slice();
    return pool[Math.floor(Math.random() * pool.length)];
  }

  function showPick(menu) {
    current = menu;
    if (sessionShown.indexOf(menu.id) === -1) sessionShown.push(menu.id);
    renderPick();
    track("recommend_menu", { menu_id: menu.id, menu_name: menu.ko, menu_category: menu.cat });
  }

  function renderPick() {
    if (!current) return;
    $("pickPlaceholder").hidden = true;
    $("pickResult").hidden = false;
    var emo = $("pickEmoji");
    emo.style.animation = "none"; void emo.offsetWidth; emo.style.animation = "";
    emo.textContent = current.emoji;
    $("pickName").textContent = menuName(current);
    $("pickCat").textContent = catName(current);
    $("recommendBtn").textContent = t().recommendAgain;
    $("actionRow").hidden = false;
    renderMaps();
  }

  // ---- 주변 음식점 (검색은 한국어 키워드로: 한국 지도 서비스 결과가 정확) ----
  function renderMaps() {
    if (!current) return;
    var q = encodeURIComponent(current.ko);
    $("mapKakao").href = "https://map.kakao.com/?q=" + q;
    $("mapNaver").href = "https://m.map.naver.com/search2/search.naver?query=" + q;
    $("mapGoogle").href = "https://www.google.com/maps/search/" + q;
    $("mapsLabel").innerHTML = t().mapsLabel(menuName(current));
    $("mapsBox").hidden = false;
  }

  // ---- 저장 / 기록 ----
  function eatCurrent() {
    if (!current) return;
    var h = loadHistory();
    var today = todayStr();
    h = h.filter(function (item) { return item.date !== today; });
    h.unshift({ date: today, id: current.id, name: current.ko, emoji: current.emoji });
    saveHistory(h);
    renderHistory();
    track("save_menu", { menu_id: current.id, menu_name: current.ko, menu_category: current.cat });
    $("eatBtn").textContent = t().saved;
    setTimeout(function () { $("eatBtn").textContent = t().eat; }, 1200);
  }

  function renderHistory() {
    var h = loadHistory();
    var list = $("histList");
    list.innerHTML = "";
    if (h.length === 0) {
      var li = document.createElement("li");
      li.className = "empty"; li.textContent = t().empty;
      list.appendChild(li); return;
    }
    h.slice(0, 14).forEach(function (item) {
      var m = item.id ? findMenu(item.id) : null;
      var label = m ? menuName(m) : (item.name || "");
      var li = document.createElement("li");
      li.className = "hist-item";
      var e = document.createElement("span"); e.className = "he"; e.textContent = item.emoji || "🍽️";
      var n = document.createElement("span"); n.textContent = label;
      var d = document.createElement("span"); d.className = "hd"; d.textContent = prettyDate(item.date);
      li.appendChild(e); li.appendChild(n); li.appendChild(d);
      list.appendChild(li);
    });
  }

  // ---- 언어 적용 ----
  function applyLang() {
    var s = t();
    document.documentElement.lang = s.htmlLang;
    document.title = s.docTitle;
    $("langBtn").textContent = s.langBtn;
    $("title").textContent = s.title;
    $("subtitle").textContent = s.subtitle;
    $("pickPlaceholder").textContent = s.placeholder;
    $("recommendBtn").textContent = current ? s.recommendAgain : s.recommend;
    $("rerollBtn").textContent = s.other;
    $("eatBtn").textContent = s.eat;
    $("lblKakao").textContent = s.kakao;
    $("lblNaver").textContent = s.naver;
    $("lblGoogle").textContent = s.google;
    $("settingsLabel").innerHTML = s.settings(s.cooldownOpt($("cooldown").value));
    var opts = $("cooldown").options;
    for (var i = 0; i < opts.length; i++) opts[i].textContent = s.cooldownOpt(opts[i].value);
    $("adLabel").textContent = s.adLabel;
    $("histTitle").textContent = s.histTitle;
    $("clearBtn").textContent = s.clear;
    $("footer").textContent = s.footer;

    // 날짜 라벨
    var now = new Date();
    $("todayLabel").textContent = now.toLocaleDateString(s.locale, { year: undefined, month: "long", day: "numeric", weekday: "long" });

    if (current) renderPick();
    renderHistory();
  }

  function setLang(next) {
    lang = next;
    var s = loadSettings(); s.lang = next; saveSettings(s);
    applyLang();
    track("change_language", { language: next });
  }

  // ---- 이벤트 ----
  $("recommendBtn").addEventListener("click", function () { showPick(pickMenu()); });
  $("rerollBtn").addEventListener("click", function () { showPick(pickMenu()); });
  $("eatBtn").addEventListener("click", eatCurrent);
  $("clearBtn").addEventListener("click", function () {
    if (confirm(t().confirmClear)) { saveHistory([]); renderHistory(); }
  });
  $("cooldown").addEventListener("change", function () {
    var s = loadSettings(); s.cooldown = $("cooldown").value; saveSettings(s);
    sessionShown = [];
    $("settingsLabel").innerHTML = t().settings(t().cooldownOpt($("cooldown").value));
  });
  $("langBtn").addEventListener("click", function () { setLang(lang === "ko" ? "en" : "ko"); });

  // ---- 초기화 ----
  function init() {
    loadGA();
    var s = loadSettings();
    if (s.cooldown) $("cooldown").value = s.cooldown;
    // 언어: 저장값 > 브라우저 언어 > 한국어
    if (s.lang === "ko" || s.lang === "en") lang = s.lang;
    else lang = (navigator.language || "ko").toLowerCase().indexOf("ko") === 0 ? "ko" : "en";
    applyLang();
  }
  init();
})();
</script>
</body>
</html>

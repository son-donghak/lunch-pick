<!-- =========================================================
     [Kakao 지도 API] 실제 식당 검색용
     1) https://developers.kakao.com → 내 애플리케이션 추가
     2) 앱 키 > "JavaScript 키" 복사
     3) 아래 스크립트의 KAKAO_JS_KEY 를 그 키로 교체
     4) [중요] 카카오 개발자 콘솔 > 플랫폼 > Web 에
        사이트 도메인 등록: https://son-donghak.github.io

     키를 넣기 전(KAKAO_JS_KEY 그대로)에는 지도앱 검색으로 자동 폴백됩니다.

<style>
  :root {
    --bg: #fff7f0; --card: #ffffff; --ink: #2b2622; --muted: #8a807a; --line: #f0e6dc;
    --brand: #ff6b35; --brand-dark: #e85220; --brand-soft: #fff0e8; --ok: #2f9e57;
    --shadow: 0 10px 30px rgba(255, 107, 53, 0.12); --radius: 18px;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  [hidden] { display: none !important; }   /* class의 display 설정에 hidden이 묻히지 않도록 */
  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Apple SD Gothic Neo",
      "Malgun Gothic", "Noto Sans KR", sans-serif;
    background: var(--bg); color: var(--ink); line-height: 1.6;
    -webkit-font-smoothing: antialiased; padding: 16px; display: flex; justify-content: center;
  }
  .wrap { width: 100%; max-width: 460px; }

  .lang-bar { display: flex; justify-content: space-between; align-items: center; gap: 8px; flex-wrap: wrap; }
  .lang-btn {
    background: #fff; border: 1px solid var(--line); border-radius: 999px;
    padding: 6px 14px; font-family: inherit; font-size: 13px; font-weight: 700;
    color: var(--brand-dark); cursor: pointer; transition: background .15s;
  }
  .lang-btn:hover { background: var(--brand-soft); }

  .auth-bar { display: flex; align-items: center; gap: 6px; }
  .auth-btn {
    display: inline-flex; align-items: center; gap: 6px; background: #fff; border: 1px solid var(--line);
    border-radius: 999px; padding: 6px 12px; font-family: inherit; font-size: 12.5px; font-weight: 700;
    cursor: pointer; color: var(--ink); transition: background .15s;
  }
  .auth-btn:hover { background: var(--brand-soft); }
  .user-chip { display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--muted); }
  .user-chip img { width: 22px; height: 22px; border-radius: 50%; }
  .user-chip .uname { max-width: 90px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .user-chip button { background: none; border: none; color: var(--brand-dark); font-family: inherit; font-size: 12px; font-weight: 700; cursor: pointer; }
  .login-note { text-align: center; color: var(--muted); font-size: 13px; padding: 10px 4px; }

  header { text-align: center; padding: 8px 0 6px; }
  header h1 { font-size: 22px; letter-spacing: -0.5px; }
  header p { color: var(--muted); font-size: 13px; margin-top: 4px; }
  .today { font-size: 12px; color: var(--brand-dark); font-weight: 600; margin-top: 6px; }

  .card { background: var(--card); border-radius: var(--radius); box-shadow: var(--shadow); padding: 22px; margin-top: 16px; }

  /* 거리 슬라이더 */
  .radius { margin-bottom: 16px; }
  .radius .rl { display: block; font-size: 13px; color: var(--muted); margin-bottom: 8px; text-align: center; font-weight: 700; }
  .radius .rl b { color: var(--brand-dark); }
  .radius input[type=range] { width: 100%; accent-color: var(--brand); height: 22px; }

  .btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    border: none; border-radius: 12px; cursor: pointer; font-family: inherit; font-weight: 700;
    font-size: 16px; padding: 14px 18px; width: 100%; transition: transform .08s, background .15s, box-shadow .15s;
  }
  .btn:active { transform: scale(.98); }
  .btn:disabled { opacity: .6; cursor: default; }
  .btn-primary { background: var(--brand); color: #fff; box-shadow: 0 6px 16px rgba(255,107,53,.35); }
  .btn-primary:hover { background: var(--brand-dark); }
  .btn-ghost { background: var(--brand-soft); color: var(--brand-dark); }
  .btn-ghost:hover { background: #ffe3d4; }
  .btn-ok { background: var(--ok); color: #fff; }

  /* 식당 검색 상태/결과 */
  .place-status { text-align: center; color: var(--muted); font-size: 13.5px; padding: 16px 4px; }
  .place-status a { color: var(--brand-dark); font-weight: 700; }
  .reco { border: 2px solid var(--brand); background: var(--brand-soft); border-radius: 14px; padding: 14px; margin-top: 16px; }
  .reco .rtag { font-size: 12px; color: var(--brand-dark); font-weight: 800; }
  .reco .rname { font-size: 20px; font-weight: 800; margin-top: 3px; letter-spacing: -0.4px; }
  .reco .rmeta { font-size: 13px; color: var(--muted); margin-top: 3px; }
  .reco .rbtns { display: flex; gap: 8px; margin-top: 12px; }
  .reco .rbtns .btn { font-size: 14px; padding: 11px 8px; }
  .reco .rlink { display: inline-block; margin-top: 10px; font-size: 13px; color: var(--brand-dark); font-weight: 700; text-decoration: none; }
  .list-title { font-size: 13px; color: var(--muted); margin-top: 16px; font-weight: 700; }
  .place-list { list-style: none; margin-top: 6px; }
  .place-list li { border-bottom: 1px solid var(--line); }
  .place-list li:last-child { border-bottom: none; }
  .place-list a { text-decoration: none; color: var(--ink); display: flex; align-items: baseline; gap: 8px; padding: 11px 0; }
  .place-list .pn { font-weight: 700; font-size: 15px; }
  .place-list .pc { font-size: 12px; color: var(--muted); }
  .place-list .pd { font-size: 12px; color: var(--brand-dark); margin-left: auto; font-weight: 700; white-space: nowrap; }

  .sec-title { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; }
  .sec-title h2 { font-size: 15px; }
  .sec-title button { background: none; border: none; color: var(--muted); font-size: 12px; cursor: pointer; font-family: inherit; }
  .sec-title button:hover { color: var(--brand-dark); }
  .hist-list { list-style: none; }
  .hist-item { display: flex; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid var(--line); font-size: 15px; }
  .hist-item:last-child { border-bottom: none; }
  .hist-item .he { font-size: 22px; }
  .hist-item .hd { color: var(--muted); font-size: 12px; margin-left: auto; }
  .empty { color: var(--muted); font-size: 14px; text-align: center; padding: 16px 0; }

  .ad-slot {
    margin-top: 16px; min-height: 100px; display: flex; align-items: center; justify-content: center;
    background: #fff; border: 1px dashed var(--line); border-radius: 14px; color: var(--muted); font-size: 12px; text-align: center; padding: 12px;
  }

  /* 게시판 */
  .board-form { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .board-form input, .board-form textarea {
    font-family: inherit; font-size: 14px; padding: 10px 12px; border: 1px solid var(--line);
    border-radius: 10px; background: #fff; color: var(--ink); width: 100%;
  }
  .board-form .row { display: flex; gap: 8px; }
  .board-form textarea { resize: vertical; min-height: 64px; }
  .board-filter { margin-bottom: 12px; }
  .board-filter select { font-family: inherit; font-size: 13px; padding: 7px 10px; border: 1px solid var(--line); border-radius: 10px; background: #fff; color: var(--ink); width: 100%; }
  .board-list { list-style: none; }
  .board-item { padding: 12px 0; border-bottom: 1px solid var(--line); }
  .board-item:last-child { border-bottom: none; }
  .board-item .bhead { display: flex; align-items: baseline; gap: 8px; flex-wrap: wrap; }
  .board-item .bregion { font-size: 12px; font-weight: 800; color: var(--brand-dark); background: var(--brand-soft); border-radius: 999px; padding: 2px 8px; }
  .board-item .brest { font-weight: 700; font-size: 15px; }
  .board-item .bmeta { font-size: 11px; color: var(--muted); margin-left: auto; white-space: nowrap; }
  .board-item .breview { font-size: 13.5px; color: var(--ink); margin-top: 5px; white-space: pre-wrap; }
  .board-item .bnick { font-size: 11px; color: var(--muted); margin-top: 4px; }
  .board-status { text-align: center; color: var(--muted); font-size: 13px; padding: 10px 4px; }

  footer { text-align: center; color: var(--muted); font-size: 11px; padding: 22px 0 8px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="lang-bar">
    <div class="auth-bar" id="authBar">

<!-- =========================================================
     [Supabase] 게시판(후기 공유) 기능용
     1) https://supabase.com 에서 프로젝트 생성
     2) Project Settings > API 에서 Project URL, anon public key 복사
     3) 아래 SUPABASE_URL / SUPABASE_ANON_KEY 를 교체
     4) Authentication > Providers 에서 Google, Kakao 활성화
        (각 콘솔에서 OAuth Client ID/Secret 발급 후 입력,
         Authentication > URL Configuration 에 배포 도메인 Redirect URL 등록)
     5) SQL Editor에서 아래 쿼리 실행:

        create table posts (
          id bigint generated always as identity primary key,
          created_at timestamptz not null default now(),
          user_id uuid not null references auth.users(id) on delete cascade,
          region text not null,
          restaurant text not null,
          review text not null
        );
        alter table posts enable row level security;
        create policy "anyone can read posts" on posts for select using (true);
        create policy "logged-in users can insert own posts" on posts for insert with check (auth.uid() = user_id);

        create table visits (
          id bigint generated always as identity primary key,
          created_at timestamptz not null default now(),
          user_id uuid not null references auth.users(id) on delete cascade,
          visit_date date not null,
          name text not null,
          emoji text default '📍'
        );
        alter table visits enable row level security;
        create policy "users can read own visits" on visits for select using (auth.uid() = user_id);
        create policy "users can insert own visits" on visits for insert with check (auth.uid() = user_id);
        create policy "users can delete own visits" on visits for delete using (auth.uid() = user_id);

     키를 넣기 전(SUPABASE_URL 그대로)에는 게시판/기록이 비활성화 안내만 표시됩니다.
        게시판 작성과 다녀온 식당 기록은 모두 로그인이 필요합니다.
========================================================== -->

  var SUPABASE_URL = "https://apyrrzxfdjmdfhvqyvgi.supabase.co";

      boardSubmit: "후기 남기기", boardSubmitting: "등록 중…",
      boardAllRegions: "전체 지역",
      boardDisabled: "게시판 기능은 Supabase 연동 후 사용할 수 있어요.",
      boardLoading: "후기를 불러오는 중…", boardEmpty: "아직 후기가 없어요. 첫 후기를 남겨보세요!",
      boardLoadErr: "후기를 불러오지 못했어요.", boardSubmitErr: "등록 중 문제가 생겼어요. 다시 시도해 주세요.",
      boardFillAll: "지역, 식당명, 후기를 모두 입력해 주세요.",
      anon: "익명",
      loginGoogle: "G 로그인", loginKakao: "K 로그인", logout: "로그아웃",
      loginRequiredBoard: "후기를 남기려면 로그인이 필요해요.",
      loginRequiredHist: "로그인하면 다녀온 식당이 내 계정에 저장돼요.",
      authDisabled: "로그인 기능은 Supabase 연동 후 사용할 수 있어요."
    },
    en: {
      htmlLang: "en", docTitle: "What's for lunch today? · Lunch picker", langBtn: "한국어",
      title: "🍱 What's for lunch today?", subtitle: "Find restaurants near you.",
      radius: function (m) { return "Within <b>" + fmtDist(m) + "</b>"; },
      findNearby: "📍 Recommend a spot near me",
      locating: "📡 Getting your location…", searching: "🔎 Searching nearby…",
      locErr: "Couldn't get your location. Please allow location access in your browser.",
      noResults: function (n) { return (n ? "No '" + n + "' restaurants in range." : "No restaurants in range.") + " Try a larger radius."; },
      searchErr: "Something went wrong. Please try again.",
      kakaoNote: "The nearby-restaurant list turns on once a Kakao Maps API key is set.",
      kakaoMapLink: "Open nearby restaurants in Kakao Map →",
      recoTag: "📍 Recommended", listTitle: "More nearby",
      goHere: "✅ I'll go here", anotherSpot: "🔄 Another", placeInfo: "Directions & info →", saved: "✅ Saved!",
      away: function (m) { return fmtDist(m) + " away"; },
      adLabel: "Ad space · Your AdSense ad will appear here after approval",
      histTitle: "📅 My visited spots", clear: "Clear history",
      empty: "No history yet. Pick a spot and save it!",
      footer: "🍳",
      confirmClear: "Clear all history?", today: "Today", yesterday: "Yesterday", locale: "en-US",
      boardTitle: "💬 Lunch review board",
      boardRegionPh: "Region (e.g. Gangnam)", boardRestaurantPh: "Restaurant name", boardReviewPh: "Share your review",
      boardSubmit: "Post review", boardSubmitting: "Posting…",
      boardAllRegions: "All regions",
      boardDisabled: "The board will be available once Supabase is connected.",
      boardLoading: "Loading reviews…", boardEmpty: "No reviews yet. Be the first to post!",
      boardLoadErr: "Couldn't load reviews.", boardSubmitErr: "Something went wrong. Please try again.",
      boardFillAll: "Please fill in region, restaurant, and review.",
      anon: "Anonymous",
      loginGoogle: "Sign in with G", loginKakao: "Sign in with K", logout: "Log out",
      loginRequiredBoard: "Sign in to post a review.",
      loginRequiredHist: "Sign in to save your visited spots to your account.",
      authDisabled: "Sign-in will be available once Supabase is connected."
    }
  };

  var SET_KEY = "lunchpick_settings_v1";
  var lang = "ko";
  var lastPlaces = [], recoPlace = null, shownIds = [];
  var boardPosts = [], boardRegions = [], boardRegionSel = "";
  var currentUser = null, visits = [];

  var $ = function (id) { return document.getElementById(id); };

  function loadSettings() { try { return JSON.parse(localStorage.getItem(SET_KEY)) || {}; } catch (e) { return {}; } }
  function saveSettings(s) { try { localStorage.setItem(SET_KEY, JSON.stringify(s)); } catch (e) {} }

  function t() { return STR[lang]; }
  function fmtDist(m) { return m >= 1000 ? (Math.round(m / 100) / 10) + "km" : m + "m"; }
  function shortCat(c) { if (!c) return ""; var p = c.split(">"); return p[p.length - 1].trim(); }
  function curRadius() { return parseInt($("radius").value, 10) || 500; }

  function dstr(d) { return d.getFullYear() + "-" + String(d.getMonth() + 1).padStart(2, "0") + "-" + String(d.getDate()).padStart(2, "0"); }
  function todayStr() { return dstr(new Date()); }
  function daysAgoStr(n) { var d = new Date(); d.setDate(d.getDate() - n); return dstr(d); }
  function prettyDate(s) {
    if (s === todayStr()) return t().today;
    if (s === daysAgoStr(1)) return t().yesterday;
    var p = s.split("-");
    return new Date(+p[0], +p[1] - 1, +p[2]).toLocaleDateString(t().locale, { month: "short", day: "numeric", weekday: "short" });
  }

  // ====== 식당 검색 ======
  function clearPlaces() {
    lastPlaces = []; recoPlace = null; shownIds = [];
    $("placeResults").hidden = true; $("placeStatus").hidden = true;
  }
  function showStatus(html) { $("placeStatus").innerHTML = html; $("placeStatus").hidden = false; $("placeResults").hidden = true; }

  function runSearch() {
    if (!kakaoEnabled()) {
      showStatus(t().kakaoNote + '<br><a href="https://map.kakao.com/?q=' + encodeURIComponent("음식점") + '" target="_blank" rel="noopener">' + t().kakaoMapLink + "</a>");
      return;
    }
    showStatus(t().locating);
    loadKakao(function (ok) {
      if (!ok) { showStatus(t().searchErr); return; }
      ensureLocation(function (err, pos) {
        if (err) { showStatus(t().locErr); return; }
        showStatus(t().searching);
        var ps = new window.kakao.maps.services.Places();
        var radius = curRadius();
        // gssg - 거리 제한 오작동 문제 수정 - radius 옵션은 location 기준으로 적용됨 start - [
        var loc = new window.kakao.maps.LatLng(pos.lat, pos.lng);
        var opts = { location: loc, radius: radius, sort: window.kakao.maps.services.SortBy.DISTANCE, size: 15 };
        // ] - end
        // gssg - size:15 한 페이지 제한 때문에 가까운 결과로만 채워지는 문제 수정 - 전 페이지(최대 3) 모아서 반경 전체 풀 확보 start - [
        var allPlaces = [];
        var finish = function () {
          var result = allPlaces;
          if (!result.length) { showStatus(t().noResults(null)); return; }
          lastPlaces = result;
          shownIds = [];
          recoPlace = result[Math.floor(Math.random() * result.length)];
          shownIds.push(recoPlace.id);
          renderPlaces();
          track("find_restaurants", { radius: radius, count: result.length });
        };
        var done = function (data, status, pagination) {
          var S = window.kakao.maps.services.Status;
          if (status === S.OK && data && data.length) {
            allPlaces = allPlaces.concat(data);
            if (pagination && pagination.hasNextPage && pagination.current < 3) {
              pagination.nextPage();
              return;
            }
            finish();
          } else if (status === S.ZERO_RESULT) {
            if (allPlaces.length) finish();
            else showStatus(t().noResults(null));
          } else {
            showStatus(t().searchErr);
          }
        };
        // ] - end
        ps.categorySearch("FD6", done, opts);
      });
    });
  }

  function renderPlaces() {
    if (!recoPlace) return;
    $("placeStatus").hidden = true;
    // 추천 식당 카드
    var r = recoPlace;
    var reco = $("placeReco");
    reco.innerHTML = "";
    var tag = el("div", "rtag", t().recoTag);
    var name = el("div", "rname", r.place_name);
    var meta = el("div", "rmeta", shortCat(r.category_name) + " · " + t().away(parseInt(r.distance, 10) || 0));
    var btns = document.createElement("div"); btns.className = "rbtns";
    var goBtn = document.createElement("button"); goBtn.className = "btn btn-ok"; goBtn.textContent = t().goHere;
    goBtn.addEventListener("click", function () { saveSpot(r, goBtn); });
    var anotherBtn = document.createElement("button"); anotherBtn.className = "btn btn-ghost"; anotherBtn.textContent = t().anotherSpot;
    anotherBtn.addEventListener("click", pickAnotherSpot);
    btns.appendChild(anotherBtn); btns.appendChild(goBtn);
    var link = document.createElement("a"); link.className = "rlink"; link.href = r.place_url; link.target = "_blank"; link.rel = "noopener"; link.textContent = t().placeInfo;
    reco.appendChild(tag); reco.appendChild(name); reco.appendChild(meta); reco.appendChild(btns); reco.appendChild(link);

    // 목록
    $("listTitle").textContent = t().listTitle;
    var list = $("placeList"); list.innerHTML = "";
    lastPlaces.slice(0, 8).forEach(function (p) {
      var li = document.createElement("li");
      var a = document.createElement("a"); a.href = p.place_url; a.target = "_blank"; a.rel = "noopener";
      a.appendChild(el("span", "pn", p.place_name));
      a.appendChild(el("span", "pc", shortCat(p.category_name)));
      a.appendChild(el("span", "pd", fmtDist(parseInt(p.distance, 10) || 0)));
      li.appendChild(a); list.appendChild(li);
    });
    $("placeResults").hidden = false;
  }
  function el(tag, cls, text) { var e = document.createElement(tag); if (cls) e.className = cls; if (text != null) e.textContent = text; return e; }

  function pickAnotherSpot() {
    if (lastPlaces.length <= 1) return;
    var unseen = lastPlaces.filter(function (p) { return shownIds.indexOf(p.id) === -1; });
    if (!unseen.length) { shownIds = recoPlace ? [recoPlace.id] : []; unseen = lastPlaces.filter(function (p) { return shownIds.indexOf(p.id) === -1; }); }
    var next = unseen[Math.floor(Math.random() * unseen.length)];
    shownIds.push(next.id);
    recoPlace = next; renderPlaces();
  }

  function saveSpot(place, btn) {
    var client = getSb();
    if (!client || !currentUser) { alert(t().loginRequiredHist); return; }
    var today = todayStr();
    client.from("visits").delete().eq("user_id", currentUser.id).eq("visit_date", today)
      .then(function () {
        return client.from("visits").insert({ user_id: currentUser.id, visit_date: today, name: place.place_name, emoji: "📍" });
      })
      .then(function (res) {
        if (res.error) return;
        track("save_place", { place_name: place.place_name });
        if (btn) { btn.textContent = t().saved; setTimeout(function () { btn.textContent = t().goHere; }, 1200); }
        loadVisits();
      });
  }

  function loadVisits() {
    var client = getSb();
    if (!client || !currentUser) { visits = []; renderHistory(); return; }
    client.from("visits").select("*").eq("user_id", currentUser.id).order("visit_date", { ascending: false }).limit(14)
      .then(function (res) {
        visits = res.error ? [] : (res.data || []);
        renderHistory();
      });
  }

  function renderHistory() {
    var note = $("histLoginNote"), list = $("histList");
    if (!supabaseEnabled()) { note.textContent = t().authDisabled; note.hidden = false; list.innerHTML = ""; return; }
    if (!currentUser) { note.textContent = t().loginRequiredHist; note.hidden = false; list.innerHTML = ""; return; }
    note.hidden = true;
    list.innerHTML = "";
    if (!visits.length) { list.appendChild(el("li", "empty", t().empty)); return; }
    visits.forEach(function (it) {
      var li = document.createElement("li"); li.className = "hist-item";
      li.appendChild(el("span", "he", it.emoji || "🍽️"));
      li.appendChild(el("span", null, it.name || ""));
      li.appendChild(el("span", "hd", prettyDate(it.visit_date)));
      list.appendChild(li);
    });
  }

  // ====== 게시판 ======
  function showBoardStatus(text) { $("boardStatus").textContent = text; $("boardStatus").hidden = false; $("boardList").innerHTML = ""; }

  function loadBoardPosts() {
    var client = getSb();
    if (!client) { showBoardStatus(t().boardDisabled); $("boardForm").hidden = true; $("boardRegionFilter").hidden = true; return; }
    showBoardStatus(t().boardLoading);
    client.from("posts").select("*").order("created_at", { ascending: false }).limit(200)
      .then(function (res) {
        if (res.error) { showBoardStatus(t().boardLoadErr); return; }
        boardPosts = res.data || [];
        boardRegions = [];
        boardPosts.forEach(function (p) { if (boardRegions.indexOf(p.region) === -1) boardRegions.push(p.region); });
        renderBoardFilter();
        renderBoardList();
      });
  }

  function renderBoardFilter() {
    var sel = $("boardRegionFilter");
    var cur = boardRegionSel;
    sel.innerHTML = "";
    var optAll = document.createElement("option"); optAll.value = ""; optAll.textContent = t().boardAllRegions;
    sel.appendChild(optAll);
    boardRegions.forEach(function (r) {
      var o = document.createElement("option"); o.value = r; o.textContent = r; sel.appendChild(o);
    });
    sel.value = cur && boardRegions.indexOf(cur) !== -1 ? cur : "";
  }

  function renderBoardList() {
    $("boardStatus").hidden = true;
    var list = $("boardList"); list.innerHTML = "";
    var posts = boardRegionSel ? boardPosts.filter(function (p) { return p.region === boardRegionSel; }) : boardPosts;
    if (!posts.length) { showBoardStatus(t().boardEmpty); return; }
    posts.forEach(function (p) {
      var li = document.createElement("li"); li.className = "board-item";
      var head = document.createElement("div"); head.className = "bhead";
      head.appendChild(el("span", "bregion", p.region));
      head.appendChild(el("span", "brest", p.restaurant));
      head.appendChild(el("span", "bmeta", new Date(p.created_at).toLocaleDateString(t().locale, { month: "short", day: "numeric" })));
      li.appendChild(head);
      li.appendChild(el("div", "breview", p.review));
      list.appendChild(li);
    });
  }

  function submitBoardPost() {
    var client = getSb();
    if (!client) return;
    if (!currentUser) { alert(t().loginRequiredBoard); return; }
    var region = $("boardRegion").value.trim();
    var restaurant = $("boardRestaurant").value.trim();
    var review = $("boardReview").value.trim();
    if (!region || !restaurant || !review) { alert(t().boardFillAll); return; }
    var btn = $("boardSubmitBtn");
    btn.disabled = true; btn.textContent = t().boardSubmitting;
    client.from("posts").insert({ user_id: currentUser.id, region: region, restaurant: restaurant, review: review })
      .then(function (res) {
        btn.disabled = false; btn.textContent = t().boardSubmit;
        if (res.error) { alert(t().boardSubmitErr); return; }
        $("boardForm").reset();
        track("board_post", { region: region });
        loadBoardPosts();
      });
  }

  // ====== 언어 적용 ======
  function applyLang() {
    var s = t();
    document.documentElement.lang = s.htmlLang; document.title = s.docTitle;
    $("langBtn").textContent = s.langBtn;
    $("title").textContent = s.title; $("subtitle").textContent = s.subtitle;
    $("radiusLabel").innerHTML = s.radius(curRadius());
    $("findNearbyBtn").textContent = s.findNearby;
    $("adLabel").textContent = s.adLabel;
    $("histTitle").textContent = s.histTitle; $("clearBtn").textContent = s.clear;
    $("footer").textContent = s.footer;
    var now = new Date();
    $("todayLabel").textContent = now.toLocaleDateString(s.locale, { month: "long", day: "numeric", weekday: "long" });
    if (!$("placeResults").hidden && recoPlace) renderPlaces();
    renderHistory();
    $("boardTitle").textContent = s.boardTitle;
    $("boardRegion").placeholder = s.boardRegionPh;
    $("boardRestaurant").placeholder = s.boardRestaurantPh;
    $("boardReview").placeholder = s.boardReviewPh;
    $("boardSubmitBtn").textContent = s.boardSubmit;
    if (supabaseEnabled()) {
      renderBoardFilter();
      if (boardPosts.length || $("boardStatus").hidden) renderBoardList();
      else $("boardStatus").textContent = s.boardLoading;
    } else {
      $("boardStatus").textContent = s.boardDisabled; $("boardStatus").hidden = false;
    }
    renderAuthUI();
    renderHistory();
  }
  function setLang(next) {
    lang = next; var s = loadSettings(); s.lang = next; saveSettings(s);
    applyLang(); track("change_language", { language: next });
  }

  // ====== 이벤트 ======
  $("findNearbyBtn").addEventListener("click", function () { runSearch(); });
  $("radius").addEventListener("input", function () { $("radiusLabel").innerHTML = t().radius(curRadius()); });
  $("clearBtn").addEventListener("click", function () {
    if (!currentUser) return;
    if (!confirm(t().confirmClear)) return;
    var client = getSb();
    client.from("visits").delete().eq("user_id", currentUser.id).then(function () { loadVisits(); });
  });
  $("langBtn").addEventListener("click", function () { setLang(lang === "ko" ? "en" : "ko"); });
  $("radius").addEventListener("change", function () {
    var s = loadSettings(); s.radius = this.value; saveSettings(s);
  });
  $("boardForm").addEventListener("submit", function (e) { e.preventDefault(); submitBoardPost(); });
  $("boardRegionFilter").addEventListener("change", function () { boardRegionSel = this.value; renderBoardList(); });

  // ====== 초기화 ======
  function init() {
    loadGA();
    var s = loadSettings();
    if (s.radius) $("radius").value = s.radius;
    if (s.lang === "ko" || s.lang === "en") lang = s.lang;
    else lang = (navigator.language || "ko").toLowerCase().indexOf("ko") === 0 ? "ko" : "en";
    applyLang();
    clearPlaces();
    loadBoardPosts();
    var client = getSb();
    if (client) {
      client.auth.getSession().then(function (res) {
        currentUser = res.data && res.data.session ? res.data.session.user : null;
        renderAuthUI(); loadVisits();
      });
      client.auth.onAuthStateChange(function (event, session) {
        currentUser = session ? session.user : null;
        renderAuthUI(); loadVisits();
      });
    }
  }
  init();
})();
</script>
</body>
</html>
